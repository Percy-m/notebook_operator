swagger: '2.0'
info:
  description: 作业执行与作业记录管理接口
  version: v1
  title: AIPDCompRouteService - 作业执行接口
basePath: /compRoute
tags:
  - name: ComputeController
    description: Spark作业管理接口

paths:
  /job/create:
    post:
      x-wsf-allParameterCheck: false
      tags:
        - ComputeController
      consumes:
        - multipart/form-data
      produces:
        - application/json
      x-returnType: ResponseDto<String>
      x-imports:
        - com.huawei.aipd.service.bean.ResponseDto
        - org.springframework.web.multipart.MultipartFile
      summary: 创建作业执行记录
      description: 提交脚本执行作业,异步处理作业投递
      operationId: create
      parameters:
        - name: jobFileList
          in: formData
          type: file
          x-type: MultipartFile[]
          description: 上传的执行文件
        - name: createJobVo
          in: formData
          description: 创建作业请求参数
          x-type: CreateJobRequestVo
          schema:
            $ref: '#/definitions/CreateJobRequestVo'
      responses:
        '200':
          description: 成功响应
          schema:
            type: string
            description: 作业ID

  /job/get:
    get:
      x-wsf-allParameterCheck: false
      tags:
        - ComputeController
      produces:
        - application/json
      x-returnType: ResponseDto<Object>
      x-imports:
        - com.huawei.aipd.service.bean.ResponseDto
      summary: 获取作业详情
      description: 获取作业执行完整信息
      operationId: get
      parameters:
        - name: jobId
          in: query
          required: true
          type: string
          maxLength: 128
          description: 作业ID
        - name: queryType
          in: query
          required: true
          type: string
          maxLength: 128
          description: 查询类型 jobPkg(作业包)、jobLog(作业日志)、jobResult(作业结果)、jobBaseInfo(作业基本信息)
        - name: isSyncJobFromProvider
          in: query
          required: false
          type: boolean
          description: 是否从运算资源提供商同步作业信息，提交作业后轮训作业状态时使用
      responses:
        '200':
          description: 成功响应

  /job/download:
    get:
      x-wsf-allParameterCheck: false
      tags:
        - ComputeController
      produces:
        - application/octet-stream
      x-returnType: ResponseEntity<Resource>
      x-imports:
        - org.springframework.http.ResponseEntity
        - org.springframework.core.io.Resource
      summary: 下载作业文件
      description: 根据作业ID和下载类型下载对应文件，支持日志、作业包等类型，可指定文件格式
      operationId: download
      parameters:
        - name: jobId
          in: query
          required: true
          type: string
          maxLength: 128
          description: 作业ID
        - name: downloadType
          in: query
          required: true
          type: string
          maxLength: 64
          description: 下载类型 log(作业日志)、file(作业文件)
        - name: fileFormat
          in: query
          required: false
          type: string
          maxLength: 64
          description: 下载文件格式(可选,默认zip)，如zip、tar.gz、txt等
      responses:
        '200':
          description: 下载文件流
          schema:
            type: file

  /job/stop:
    post:
      tags:
        - ComputeController
      produces:
        - application/json
      x-returnType: ResponseDto<StopJobResponseVo>
      x-imports:
        - com.huawei.aipd.service.bean.ResponseDto
      summary: 停止作业
      description: 根据作业ID停止正在执行的作业，任务状态变为cancelling，返回停止结果
      operationId: stop
      parameters:
        - name: jobId
          in: query
          required: true
          type: string
          maxLength: 128
          description: 作业ID
      responses:
        '200':
          description: 成功响应
          schema:
            $ref: '#/definitions/StopJobResponseVo'

  /job/query:
    post:
      x-wsf-allParameterCheck: false
      tags:
        - ComputeController
      produces:
        - application/json
      x-returnType: ResponseDto<PageInfo<JobInfoVo>>
      x-imports:
        - com.huawei.aipd.service.bean.ResponseDto
        - com.huawei.aipd.service.aipdcomprouteservice.vo.PageInfo
      summary: 分页查询作业记录
      description: 查询作业执行历史记录
      operationId: query
      parameters:
        - name: curPage
          in: query
          required: true
          type: integer
          description: 当前页码
        - name: pageSize
          in: query
          required: true
          type: integer
          description: 每页条数
        - name: request
          in: body
          required: false
          description: 查询条件
          x-type: QueryJobRequestVo
          schema:
            $ref: '#/definitions/QueryJobRequestVo'
      responses:
        '200':
          description: 成功响应

definitions:
  CreateJobRequestVo:
    description: 创建作业请求VO
    required:
      - jobBizId
      - projectId
    properties:
      jobName:
        type: string
        maxLength: 256
        description: 作业名称(可选,默认使用文件名)
      jobParams:
        type: string
        description: 作业执行参数JSON
      jobBizId:
        type: string
        maxLength: 64
        description: 作业关联业务ID(必须传入)
      projectId:
        type: string
        maxLength: 64
        description: 项目ID
      engineProvider:
        type: string
        maxLength: 128
        description: 运算资源提供方
      engineType:
        type: string
        maxLength: 128
        description: 运算引擎类型
      engineJobType:
        type: string
        maxLength: 128
        description: 作业类型
      resourceId:
        type: string
        maxLength: 128
        description: 资源ID
      connectionId:
        type: string
        maxLength: 128
        description: 数据连接ID
      connection:
        type: string
        maxLength: 128
        description: 数据连接
      jobSource:
        type: string
        maxLength: 128
        description: 作业来源，NoteBook/Workflow
      owner:
        type: string
        maxLength: 128
        description: 作业所有者
      isInteractive:
        type: boolean
        description: 是否交互式，针对Spark SQL类型，默认false

  StopJobResponseVo:
    description: 停止作业响应VO
    properties:
      jobId:
        type: string
        maxLength: 128
        description: 作业ID
      jobStatus:
        type: string
        maxLength: 64
        description: 任务状态，cancelling表示正在取消
      stopResult:
        type: string
        maxLength: 64
        description: 停止执行结果，success表示停止成功，failed表示停止失败

  QueryJobRequestVo:
    description: 查询作业请求VO
    properties:
      jobId:
        type: string
        maxLength: 128
        description: 作业ID(可选)
      projectId:
        type: string
        description: 项目ID
      jobBizId:
        type: string
        description: 作业关联业务ID(可选)
      resourceId:
        type: array
        items:
          type: string
        description: 资源ID(可选，支持多个)
      jobName:
        type: array
        items:
          type: string
        description: 任务名称(可选，支持多个)
      startTime:
        description: 开始时间(可选)
        x-annotations: '@JsonFormat(pattern = "yyy-MM-dd HH:MM")'
        x-type: Date
      endTime:
        description: 结束时间(可选)
        x-annotations: '@JsonFormat(pattern = "yyy-MM-dd HH:MM")'
        x-type: Date
      jobStatus:
        type: array
        items:
          type: string
        description: 作业状态(可选)

  JobInfoVo:
    description: 作业信息VO
    properties:
      jobId:
        type: string
        description: 作业唯一标识
      jobName:
        type: string
        description: 作业名称
      jobStatusDetail:
        type: string
        description: 作业状态详情
      jobStatus:
        type: string
        description: 作业状态
      jobStatusCode:
        type: integer
        description: 作业状态编码
      jobParams:
        type: string
        description: 作业执行参数JSON
      jobSource:
        type: string
        description: 作业来源
      jobBizId:
        type: string
        description: 关联的业务Id
      engineProvider:
        type: string
        description: 运算资源提供方
      engineType:
        type: string
        description: 引擎类型
      engineJobType:
        type: string
        description: 作业类型
      engineJobId:
        type: string
        description: 运算资源提供系统对应的作业id
      jobSubmitTime:
        description: 作业投递时间
        x-annotations: '@JsonFormat(pattern = "yyy-MM-dd HH:MM")'
        x-type: Date
      jobFinishedTime:
        description: 作业完成的时间
        x-annotations: '@JsonFormat(pattern = "yyy-MM-dd HH:MM")'
        x-type: Date
      createTime:
        description: 作业创建时间
        x-annotations: '@JsonFormat(pattern = "yyy-MM-dd HH:MM")'
        x-type: Date
      updateTime:
        description: 作业更新时间
        x-annotations: '@JsonFormat(pattern = "yyy-MM-dd HH:MM")'
        x-type: Date
      createBy:
        type: string
        description: 引擎类型
      updateBy:
        type: string
        description: 更新人
      jobPkgKey:
        type: string
        description: 作业执行包OBS路径
      projectId:
        type: string
        description: 项目ID
      resourceId:
        type: string
        description: 资源ID
      connectionId:
        type: string
        description: 数据连接ID
      connection:
        type: string
        description: 数据连接
      owner:
        type: string
        description: 作业所有者
      isInteractive:
        type: boolean
        description: 是否交互式，针对Spark SQL类型

  LogFileVO:
    description: 日志文件VO
    properties:
      logName:
        type: string
        description: 日志文件名称
      updateTime:
        type: string
        description: 日志文件更新时间
      logSize:
        type: string
        description: 日志文件大小
      type:
        type: string
        description: 日志文件类型
      logPath:
        type: string
        description: 日志文件路径

  JobLogVO:
    description: 作业日志VO
    properties:
      jobId:
        type: string
        description: 作业唯一标识
      jobName:
        type: string
        description: 作业名称
      logPath:
        type: string
        description: 日志文件路径
      logFiles:
        type: array
        items:
          $ref: '#/definitions/LogFileVO'
        description: 日志文件列表
